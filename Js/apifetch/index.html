<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <script>
    fetch("https://jsonplaceholder.typicode.com/posts")
.then((res) => res.json())
.then((posts) => {

    let container = document.getElementById("post");
    posts.forEach((post) => {
        container.innerHTML += `
            <div>
                <h3>${post.title}</h3>
                <p>${post.body}</p>
                <br/>
            </div>
        `;
    });
});
   </script>
</body>
</html>
